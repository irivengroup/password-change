---
- name: Change local UNIX account passwords
  hosts: all
  become: true
  gather_facts: true

  vars:
    changepassword_target_account: '{{ tgt_user | default(''root'') }}'
    changepassword_accounts_file: '{{ accounts_file | default(playbook_dir ~ ''/../roles/changepassword/vars/accounts.yml'') }}'

  pre_tasks:
    - name: Changepassword | Check accounts vars file exists
      ansible.builtin.stat:
        path: '{{ changepassword_accounts_file }}'
      register: changepassword_accounts_file_stat
      delegate_to: localhost
      run_once: true
      become: false

    - name: Changepassword | Fail when accounts vars file is missing
      ansible.builtin.assert:
        that:
          - changepassword_accounts_file_stat.stat.exists | default(false)
          - changepassword_accounts_file_stat.stat.isreg | default(false)
        fail_msg: 'Fichier de comptes introuvable: {{ changepassword_accounts_file }}'
        quiet: true
      delegate_to: localhost
      run_once: true
      become: false

    - name: Changepassword | Load accounts vars file
      ansible.builtin.include_vars:
        file: '{{ changepassword_accounts_file }}'
      delegate_to: localhost
      run_once: true
      become: false  
  
  roles:
    - role: changepassword      