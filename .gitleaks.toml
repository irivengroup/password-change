title = "IRIVEN ChangePassword gitleaks policy"

[allowlist]
description = "Project placeholders and intentionally generated non-production fallback secret"
regexes = [
  'changepassword_default_hmac_salt_secret:',
  'changepassword_hmac_salt_secret:\s*""',
  'Molecule-[A-Za-z-]+-Password-2026!',
  'MyStrongSecret#2026!'
]
paths = [
  'roles/changepassword/defaults/main.yml',
  'playbooks/settings/accounts.yml',
  'playbooks/settings/accounts.yml.example',
  'roles/changepassword/molecule/default/converge.yml'
]
