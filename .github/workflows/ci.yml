---
name: Static validation and Molecule tests
'on':
  push:
    branches:
      - main
      - master
  pull_request: null
  workflow_dispatch: null
jobs:
  validate:
    runs-on: ubuntu-latest
    env:
      ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install validation dependencies
        run: |-
          python -m pip install --upgrade pip
          python -m pip install ansible-core ansible-lint molecule molecule-plugins[docker] yamllint docker
          ansible-galaxy collection install -r requirements.yml
      - name: Validate YAML files
        run: |-
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          failed = False

          for path in list(Path(".").rglob("*.yml")) + list(Path(".").rglob("*.yaml")):
              try:
                  yaml.safe_load(path.read_text(encoding="utf-8"))
              except Exception as exc:
                  print(f"{path}: {exc}", file=sys.stderr)
                  failed = True

          sys.exit(1 if failed else 0)
          PY
      - name: Run yamllint
        run: yamllint .
      - name: Run ansible-lint
        run: ansible-lint --profile production
      - name: Run project schema validation
        run: python scripts/validate_project.py
      - name: Run Ansible syntax check
        run: |-
          ansible-playbook \
            -i inventories/production/hosts.yml \
            playbooks/changepassword.yml \
            --syntax-check
      - name: Run Molecule default scenario
        run: cd roles/changepassword && molecule --debug test -s default
      - name: Run Molecule multi scenario
        run: cd roles/changepassword && molecule --debug test -s multi
      - name: Run Molecule negative scenario
        run: cd roles/changepassword && molecule --debug test -s negative
