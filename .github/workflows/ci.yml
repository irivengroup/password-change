---
name: CI

"on":
  push:
  pull_request:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  validate:
    name: Static validation and syntax checks
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install validation tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Show tool versions
        run: |
          python --version
          ansible --version
          ansible-playbook --version
          ansible-lint --version
          yamllint --version

      - name: Validate password hashing dependency
        run: python -c "import passlib.hash; print('passlib available')"

      - name: Validate Ansible configuration
        run: |
          ansible-config dump --only-changed
          if grep -R "stdout_callback = yaml" -n ansible.cfg roles/changepassword/molecule/default/molecule.yml; then
            echo "Deprecated stdout_callback=yaml is not allowed" >&2
            exit 1
          fi

      - name: Install Ansible requirements
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Validate YAML formatting
        run: yamllint .

      - name: Validate YAML parsing
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          failed = False
          for path in sorted(Path('.').rglob('*')):
              if path.parts[0] in {'.git', '.cache', '.venv'}:
                  continue
              if path.suffix.lower() not in {'.yml', '.yaml'}:
                  continue
              try:
                  yaml.safe_load(path.read_text(encoding='utf-8'))
              except Exception as exc:
                  failed = True
                  print(f'{path}: {exc}', file=sys.stderr)
          if failed:
              sys.exit(1)
          PY


      - name: Run Gitleaks secret scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITLEAKS_CONFIG: .gitleaks.toml

      - name: Secret hygiene scan
        run: |
          python - <<'PY'
          from pathlib import Path
          import re
          import sys

          patterns = [
              re.compile(r'(?i)(aws_secret_access_key|private_key|BEGIN RSA PRIVATE KEY|BEGIN OPENSSH PRIVATE KEY)'),
              re.compile(r"(?i)(password|secret|token)\s*[:=]\s*[\"\']?[A-Za-z0-9_@#%+=:.,/!$?&*~-]{20,}[\"\']?"),
          ]
          allowlist = {
              'roles/changepassword/defaults/main.yml',
              'inventories/production/group_vars/all/vault.yml',
              'inventories/production/group_vars/all/vault.yml.example',
              'roles/changepassword/molecule/default/converge.yml',
          }
          errors = []
          for path in Path('.').rglob('*'):
              if not path.is_file() or path.parts[0] in {'.git', '.cache', '.venv'}:
                  continue
              rel = str(path)
              text = path.read_text(encoding='utf-8', errors='ignore')
              for pattern in patterns:
                  if pattern.search(text) and rel not in allowlist:
                      errors.append(f'{rel}: potential secret-like value detected')
                      break
          if errors:
              for error in errors:
                  print(error, file=sys.stderr)
              sys.exit(1)
          PY

      - name: Run project schema validation
        run: python scripts/validate_project_schema.py

      - name: Validate Python filter plugins
        run: python -m py_compile roles/changepassword/filter_plugins/*.py

      - name: Validate Ansible inventory parsing
        run: ansible-inventory -i inventories/production/hosts.yml --list

      - name: Validate playbook syntax
        run: ansible-playbook -i inventories/production/hosts.yml --syntax-check playbooks/change_password.yml

      - name: Validate Molecule scenario playbook syntax directly
        run: |
          set -euo pipefail
          export ANSIBLE_ROLES_PATH="$PWD/roles"
          for playbook in \
            roles/changepassword/molecule/default/create.yml \
            roles/changepassword/molecule/default/prepare.yml \
            roles/changepassword/molecule/default/converge.yml \
            roles/changepassword/molecule/default/verify.yml \
            roles/changepassword/molecule/default/destroy.yml; do
            ansible-playbook --syntax-check -i localhost, "$playbook"
          done

      - name: Validate role with ansible-lint production profile
        run: ansible-lint --profile production .

      - name: Validate project invariants
        run: |
          python - <<'PY'
          from pathlib import Path
          import sys
          import yaml

          errors = []

          for path in sorted(Path('.').rglob('*')):
              if path.parts[0] in {'.git', '.cache', '.venv'}:
                  continue
              if path.is_file() and path.suffix.lower() in {'.yml', '.yaml'}:
                  try:
                      content = yaml.safe_load(path.read_text(encoding='utf-8'))
                  except Exception:
                      continue
                  if path.name in {'vault.yml', 'vault.yml.example'}:
                      accounts = (content or {}).get('unix_local_accounts', [])
                      if accounts is not None and not isinstance(accounts, list):
                          errors.append(f'{path}: unix_local_accounts must be a list of dictionaries')
                      for account in accounts or []:
                          if not isinstance(account, dict):
                              errors.append(f'{path}: each unix_local_accounts item must be a dictionary')
                              continue
                          username = account.get('username', '<undefined>')
                          if 'password' not in account or not str(account.get('password', '')).strip():
                              errors.append(f'{path}: password is mandatory for {username}')
                          if 'password_hash' in account or 'password_plain' in account or 'manage_password' in account:
                              errors.append(f'{path}: legacy password_hash/password_plain/manage_password found for {username}')
                          if account.get('state') == 'present':
                              errors.append(f'{path}: state=present is not supported for {username}; use locked/unlocked or omit state')
                          for field in ('shell', 'groups', 'append', 'home', 'uid', 'gid', 'comment', 'create_home', 'system', 'aging', 'manage_password'):
                              if field in account:
                                  errors.append(f'{path}: provisioning/per-account policy field {field!r} is not allowed for {username}')

          defaults = yaml.safe_load(Path('roles/changepassword/defaults/main.yml').read_text(encoding='utf-8'))
          if defaults.get('iriven_chgpasswd_hash_algorithm') != 'sha512':
              errors.append('roles/changepassword/defaults/main.yml: default generated hash algorithm must remain sha512')
          if defaults.get('iriven_chgpasswd_hash_salt_mode') != 'hmac_machine_id':
              errors.append('roles/changepassword/defaults/main.yml: salt mode must remain hmac_machine_id')

          if int(defaults.get('iriven_chgpasswd_default_hash_rounds', 0)) < int(defaults.get('iriven_chgpasswd_min_hash_rounds', 500000)):
              errors.append('roles/changepassword/defaults/main.yml: hash rounds must not be below the configured minimum')
          if int(defaults.get('iriven_chgpasswd_min_hmac_secret_length', 0)) < 32:
              errors.append('roles/changepassword/defaults/main.yml: HMAC secret minimum length must remain at least 32')
          if defaults.get('iriven_chgpasswd_audit_file') != '/var/log/ansible/changepassword.json':
              errors.append('roles/changepassword/defaults/main.yml: audit file path must remain /var/log/ansible/changepassword.json')
          if defaults.get('iriven_chgpasswd_audit_file_mode') != '0600':
              errors.append('roles/changepassword/defaults/main.yml: audit file mode must remain 0600')
          if defaults.get('iriven_chgpasswd_audit_dir_mode') != '0750':
              errors.append('roles/changepassword/defaults/main.yml: audit directory mode must remain 0750')
          if defaults.get('iriven_chgpasswd_audit_logrotate_enabled') is not True:
              errors.append('roles/changepassword/defaults/main.yml: audit logrotate must remain enabled by default')
          if defaults.get('iriven_chgpasswd_audit_integrity_enabled') is not True:
              errors.append('roles/changepassword/defaults/main.yml: audit checksum sidecar must remain enabled by default')
          fallback_secret = defaults.get('iriven_chgpasswd_default_hmac_salt_secret', '')
          if len(fallback_secret) != 60:
              errors.append('roles/changepassword/defaults/main.yml: default HMAC fallback secret must be exactly 60 characters')
          if not (any(c.isupper() for c in fallback_secret) and any(c.islower() for c in fallback_secret) and any(c.isdigit() for c in fallback_secret) and any(not c.isalnum() for c in fallback_secret)):
              errors.append('roles/changepassword/defaults/main.yml: default HMAC fallback secret does not meet complexity requirements')

          ansible_cfg = Path('ansible.cfg').read_text(encoding='utf-8')
          for required in ('host_key_checking = True', 'display_args_to_stdout = False', 'allow_world_readable_tmpfiles = False'):
              if required not in ansible_cfg:
                  errors.append(f'ansible.cfg: missing hardening option: {required}')

          normalize = Path('roles/changepassword/tasks/tasks.d/normalize.yml').read_text(encoding='utf-8')
          if 'inventory_hostname' in normalize:
              errors.append('roles/changepassword/tasks/tasks.d/normalize.yml: salt generation must not depend on inventory_hostname')
          audit = Path('roles/changepassword/tasks/tasks.d/audit.yml').read_text(encoding='utf-8')
          for forbidden in ('final_password_hash', 'generated_salt', 'effective_hmac', 'hmac_salt_secret', 'machine_id'):
              if forbidden in audit:
                  errors.append(f'roles/changepassword/tasks/tasks.d/audit.yml: forbidden sensitive token found: {forbidden}')
          for required in ('to_json', 'schema_version', 'timestamp_utc', 'target_user', 'execution_mode', 'password_changed'):
              if required not in audit:
                  errors.append(f'roles/changepassword/tasks/tasks.d/audit.yml: missing audit field/control: {required}')

          if errors:
              for error in errors:
                  print(error, file=sys.stderr)
              sys.exit(1)
          PY

  molecule:
    name: Molecule integration test
    runs-on: ubuntu-latest
    needs: validate

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install Molecule tooling
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Validate Ansible configuration
        run: |
          ansible-config dump --only-changed
          if grep -R "stdout_callback = yaml" -n ansible.cfg roles/changepassword/molecule/default/molecule.yml; then
            echo "Deprecated stdout_callback=yaml is not allowed" >&2
            exit 1
          fi

      - name: Install Ansible requirements
        run: ansible-galaxy collection install -r requirements.yml --force

      - name: Validate Docker runtime
        run: |
          docker version
          docker info
          docker pull docker.io/geerlingguy/docker-ubuntu2204-ansible:latest

      - name: Run Molecule test
        working-directory: roles/changepassword
        env:
          ANSIBLE_ROLES_PATH: ${{ github.workspace }}/roles
        run: molecule --debug test
