---
- name: Prepare negative scenario target
  hosts: all
  become: true
  gather_facts: false

  tasks:
    - name: molecule negative | Ensure machine-id exists
      ansible.builtin.copy:
        dest: /etc/machine-id
        content: "0123456789abcdef0123456789abcdef\n"
        owner: root
        group: root
        mode: "0444"

    - name: molecule negative | Create existing control user
      ansible.builtin.user:
        name: moleculevalid
        shell: /bin/bash
        state: present
