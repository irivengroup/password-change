---
- name: Prepare Molecule localhost test context
  hosts: localhost
  connection: local
  gather_facts: false

  tasks:
    - name: Molecule | Create runtime directories
      ansible.builtin.file:
        path: "{{ item }}"
        state: directory
        mode: "0755"
      loop:
        - /tmp/changepassword-molecule
        - /tmp/changepassword-molecule/audit

    - name: Molecule | Create deterministic fake shadow backend
      ansible.builtin.copy:
        dest: "/tmp/changepassword-molecule/shadow"
        mode: "0600"
        content: |
          root:$6$rounds=656000$saltstring$dummyhash:19700:0:99999:7:::
          moleculeops:$6$rounds=656000$saltstring$dummyhash:19700:0:99999:7:::
          moleculeapp:$6$rounds=656000$saltstring$dummyhash:19700:0:99999:7:::
