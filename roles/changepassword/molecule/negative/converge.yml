---
- name: Converge invalid target negative scenario
  hosts: localhost
  connection: local
  gather_facts: true
  become: false

  vars:
    changepassword_use_no_log: false
    changepassword_audit_enabled: false
    changepassword_enable_audit_log: false
    changepassword_lock_enabled: false
    changepassword_enable_runtime_lock: false
    changepassword_check_shadow_backend: false
    changepassword_set_aging: false
    changepassword_require_etc_passwd_user: false
    changepassword_fail_if_same_hash: false
    changepassword_hmac_salt_secret: Molecule-Hmac-Secret-2026!
    changepassword_target_account: ghost
    changepassword_local_accounts:
      - username: root
        password: $6$rounds=656000$abcdefghijklmnop$01234567890123456789012345678901234567890123456789012345678901234567890123456789
        state: unlocked
        expire: false

  tasks:
    - name: Molecule | Run role with invalid target and expect failure
      ansible.builtin.include_role:
        name: changepassword
      check_mode: true
      register: changepassword_negative_result
      failed_when: false

    - name: Molecule | Assert invalid target is rejected
      ansible.builtin.assert:
        that:
          - changepassword_negative_result is failed
        fail_msg: Invalid target account was not rejected by preflight.
