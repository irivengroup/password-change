---
- name: Validate negative controls for changepassword
  hosts: all
  connection: community.docker.docker
  become: true
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
  tasks:
    - name: Negative | Missing password must fail
      block:
        - name: Negative | Run role for missing password
          ansible.builtin.include_role:
            name: changepassword
          vars:
            ansible_python_interpreter: /usr/bin/python3
            changepassword_target_account: moleculevalid
            changepassword_hmac_salt_secret: ValidNegativeSecret#2026WithEnoughLength
            changepassword_enable_audit_log: true
            changepassword_enable_runtime_lock: true
            changepassword_require_custom_hmac_secret: true
            changepassword_use_no_log: true
            changepassword_audit_enabled: true
            changepassword_lock_enabled: true
            changepassword_audit_file: /tmp/changepassword-negative-audit.jsonl
            changepassword_lock_path: /tmp/changepassword-negative.lock
            changepassword_local_accounts:
              - changepassword_target_account: moleculevalid
                state: unlocked
        - name: Negative | Fail because missing password was accepted
          ansible.builtin.fail:
            msg: Role accepted an account without password.
      rescue:
        - name: Negative | Missing password rejected as expected
          ansible.builtin.debug:
            msg: Missing password rejected as expected.
          changed_when: false
    - name: Negative | Invalid state must fail
      block:
        - name: Negative | Run role for invalid state
          ansible.builtin.include_role:
            name: changepassword
          vars:
            ansible_python_interpreter: /usr/bin/python3
            changepassword_target_account: moleculevalid
            changepassword_hmac_salt_secret: ValidNegativeSecret#2026WithEnoughLength
            changepassword_enable_audit_log: true
            changepassword_enable_runtime_lock: true
            changepassword_require_custom_hmac_secret: true
            changepassword_use_no_log: true
            changepassword_audit_enabled: true
            changepassword_lock_enabled: true
            changepassword_audit_file: /tmp/changepassword-negative-audit.jsonl
            changepassword_lock_path: /tmp/changepassword-negative.lock
            changepassword_local_accounts:
              - changepassword_target_account: moleculevalid
                password: ValidPassword#2026!
                state: present
        - name: Negative | Fail because invalid state was accepted
          ansible.builtin.fail:
            msg: Role accepted an invalid state.
      rescue:
        - name: Negative | Invalid state rejected as expected
          ansible.builtin.debug:
            msg: Invalid state rejected as expected.
          changed_when: false
    - name: Negative | Weak HMAC secret must fail
      block:
        - name: Negative | Run role for weak hmac secret
          ansible.builtin.include_role:
            name: changepassword
          vars:
            ansible_python_interpreter: /usr/bin/python3
            changepassword_target_account: moleculevalid
            changepassword_hmac_salt_secret: weak
            changepassword_enable_audit_log: true
            changepassword_enable_runtime_lock: true
            changepassword_require_custom_hmac_secret: true
            changepassword_use_no_log: true
            changepassword_audit_enabled: true
            changepassword_lock_enabled: true
            changepassword_audit_file: /tmp/changepassword-negative-audit.jsonl
            changepassword_lock_path: /tmp/changepassword-negative.lock
            changepassword_local_accounts:
              - changepassword_target_account: moleculevalid
                password: ValidPassword#2026!
                state: unlocked
        - name: Negative | Fail because weak hmac secret was accepted
          ansible.builtin.fail:
            msg: Role accepted a weak HMAC secret.
      rescue:
        - name: Negative | Weak HMAC secret rejected as expected
          ansible.builtin.debug:
            msg: Weak HMAC secret rejected as expected.
          changed_when: false
    - name: Negative | Missing local user must fail
      block:
        - name: Negative | Run role for missing local user
          ansible.builtin.include_role:
            name: changepassword
          vars:
            ansible_python_interpreter: /usr/bin/python3
            changepassword_target_account: missinguser
            changepassword_hmac_salt_secret: ValidNegativeSecret#2026WithEnoughLength
            changepassword_enable_audit_log: true
            changepassword_enable_runtime_lock: true
            changepassword_require_custom_hmac_secret: true
            changepassword_use_no_log: true
            changepassword_audit_enabled: true
            changepassword_lock_enabled: true
            changepassword_audit_file: /tmp/changepassword-negative-audit.jsonl
            changepassword_lock_path: /tmp/changepassword-negative.lock
            changepassword_local_accounts:
              - changepassword_target_account: missinguser
                password: ValidPassword#2026!
                state: unlocked
        - name: Negative | Fail because missing local user was accepted
          ansible.builtin.fail:
            msg: Role accepted a missing local user.
      rescue:
        - name: Negative | Missing local user rejected as expected
          ansible.builtin.debug:
            msg: Missing local user rejected as expected.
          changed_when: false
