---
dependency:
  name: galaxy
driver:
  name: default
platforms:

  - name: localhost
provisioner:
  name: ansible
  inventory:
    host_vars:
      localhost:
        ansible_connection: local
        ansible_python_interpreter: '{{ ansible_playbook_python }}'
  env:
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..:${ANSIBLE_ROLES_PATH:-}
verifier:
  name: ansible
scenario:
  test_sequence:
    - syntax
    - prepare
    - converge
    - idempotence
    - verify
