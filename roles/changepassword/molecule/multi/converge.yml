---
- name: Converge changepassword role on existing users only
  hosts: all
  connection: community.docker.docker
  become: true
  gather_facts: true
  vars:
    ansible_python_interpreter: /usr/bin/python3
    changepassword_target_account: all
    changepassword_hmac_salt_secret: ValidMoleculeSecret#2026WithEnoughLength
    changepassword_audit_enabled: false
    changepassword_audit_only: false
    changepassword_lock_enabled: false
    changepassword_enable_audit_log: false
    changepassword_enable_runtime_lock: false
    changepassword_require_custom_hmac_secret: false
    changepassword_allow_default_hmac_fallback: true
    changepassword_set_aging: true
    changepassword_min_days: 3
    changepassword_max_days: 90
    changepassword_warn_days: 14
    changepassword_inactive_days: null
    changepassword_local_accounts:
      - changepassword_target_account: moleculeops
        password: Molecule-Test-Password-2026!
        state: unlocked
        expire: false
      - changepassword_target_account: moleculeaudit
        password: Molecule-Audit-Password-2026!
        state: locked
        expire: false
  roles:
    - role: changepassword
