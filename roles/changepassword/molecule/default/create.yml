---
- name: Create Molecule delegated Docker target
  hosts: localhost
  connection: local
  gather_facts: false
  vars:
    molecule_instance_name: chgpassword-ubuntu
    molecule_instance_image: docker.io/geerlingguy/docker-ubuntu2204-ansible:latest
    molecule_instance_config_path: "{{ lookup('env', 'MOLECULE_INSTANCE_CONFIG') }}"

  tasks:
    - name: molecule | Pull target image
      community.docker.docker_image:
        name: "{{ molecule_instance_image }}"
        source: pull

    - name: molecule | Create and start target container
      community.docker.docker_container:
        name: "{{ molecule_instance_name }}"
        hostname: "{{ molecule_instance_name }}"
        image: "{{ molecule_instance_image }}"
        state: started
        command: /bin/sh -c "while true; do sleep 3600; done"
        detach: true
        tty: true
        restart_policy: no
        privileged: false
        cleanup: true

    - name: molecule | Write delegated instance configuration
      ansible.builtin.copy:
        dest: "{{ molecule_instance_config_path }}"
        mode: '0600'
        content: >-
          {{
            [
              {
                'instance': molecule_instance_name,
                'address': molecule_instance_name,
                'user': 'root',
                'connection': 'community.docker.docker'
              }
            ] | to_json
          }}
