---
dependency:
  name: galaxy
driver:
  name: default
platforms:
  - name: chgpassword-ubuntu
provisioner:
  name: ansible
  env:
    ANSIBLE_DEPRECATION_WARNINGS: 'False'
    ANSIBLE_ROLES_PATH: ${MOLECULE_PROJECT_DIRECTORY}/..
  config_options:
    defaults:
      deprecation_warnings: false
      stdout_callback: default
      result_format: yaml
      roles_path: ../../..
  inventory:
    host_vars:
      chgpassword-ubuntu:
        ansible_connection: community.docker.docker
        ansible_python_interpreter: /usr/bin/python3
scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy
