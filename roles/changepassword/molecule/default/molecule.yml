---
driver:
  name: default

platforms:
  - name: Chgpassword-ubuntu
    image: docker.io/geerlingguy/docker-ubuntu2204-ansible:latest

provisioner:
  name: ansible
  env:
    ANSIBLE_DEPRECATION_WARNINGS: "False"
  playbooks:
    create: create.yml
    prepare: prepare.yml
    converge: converge.yml
    destroy: destroy.yml
  inventory:
    host_vars:
      chgpassword-ubuntu:
        ansible_connection: community.docker.docker
        ansible_user: root
  config_options:
    defaults:
      roles_path: ../../..
      stdout_callback: default
      result_format: yaml
      bin_ansible_callbacks: true
      deprecation_warnings: false

scenario:
  test_sequence:
    - syntax
    - create
    - prepare
    - converge
    - idempotence
    - verify
    - destroy

verifier:
  name: ansible
