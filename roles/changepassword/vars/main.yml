---
changepassword_manage_root: true
changepassword_allow_root_lock: false
changepassword_lock_enabled: true
changepassword_lock_path: /var/lock/iriven_chgpasswd.lock
changepassword_audit_enabled: true
changepassword_audit_owner: root
changepassword_audit_group: root
changepassword_audit_file: /var/log/ansible/changepassword.json
changepassword_audit_schema_version: 1.0
changepassword_audit_dir_mode: '0750'
changepassword_audit_file_mode: '0600'
changepassword_audit_logrotate_enabled: true
changepassword_audit_integrity_enabled: true
changepassword_min_hmac_secret_length: 32
changepassword_use_no_log: true
changepassword_password_hash_regex: ^\$(5|6)\$(rounds=[0-9]+\$)?[^$]{1,16}\$.+
changepassword_password_hash_prefix_regex: ^\$(5|6)\$
changepassword_check_shadow_backend: true
changepassword_validate_changepassword_target_account_regex: ^[a-z_][a-z0-9_-]{0,31}$|^root$
changepassword_cleanup_sensitive_facts: true
changepassword_sha512_rounds: 656000
changepassword_min_sha512_rounds: 500000
changepassword_require_etc_passwd_user: true
changepassword_fail_if_same_hash: false
changepassword_audit_logrotate_path: /etc/logrotate.d/iriven_chgpasswd
changepassword_audit_logrotate_frequency: daily
changepassword_audit_logrotate_rotate: 30
changepassword_audit_logrotate_compress: true
changepassword_forbidden_plain_values:
  - password
  - Password123!
  - ChangeMe123!
  - Admin123!
