---
# Password Change - Vault usage directives
#
# This file is intended to hold sensitive values and must be encrypted with
# ansible-vault before being committed or shared.
#
# Recommended commands:
#   ansible-vault encrypt roles/changepassword/vars/accounts.yml
#   ansible-vault edit roles/changepassword/vars/accounts.yml
#   ansible-vault encrypt_string 'MyStrongPassword!' --name 'vault_root_password'
#
# Account declaration contract:
#   changepassword_local_accounts:
#     - username: root
#       password: "{{ vault_root_password }}"
#
# Runtime selector examples:
#   ansible-playbook ... -e changepassword_target_account=root
#   ansible-playbook ... -e changepassword_target_account=<username>
#   ansible-playbook ... -e changepassword_target_account=all
#   ansible-playbook ... -e changepassword_target_account='*'
#
# Security recommendations:
#   - keep plaintext passwords out of Git history
#   - prefer vaulted variables referenced from changepassword_local_accounts
#   - keep one dictionary per managed local account
#   - use the account key 'username', not 'changepassword_target_account'
#   - do not store audit secrets or HMAC secrets in clear text

changepassword_hmac_salt_secret: ''

changepassword_local_accounts:
  - username: root
    password: replace-with-vault-secret-root-password
  - username: ansible
    password: replace-with-vault-secret-ansible-password
    state: unlocked
  - username: svc_backup
    password: $6$rounds=656000$replaceSaltHere$replaceSha512CryptHashHere
    state: locked
    expire: false
