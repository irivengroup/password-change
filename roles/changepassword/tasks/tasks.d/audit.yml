---
- name: changepassword | Write local JSON audit trail without secrets
  block:
    - name: changepassword | Ensure audit directory exists
      ansible.builtin.file:
        path: "{{ iriven_chgpasswd_audit_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0750'
      changed_when: false

    - name: changepassword | Write password rotation audit event without secrets
      ansible.builtin.lineinfile:
        path: "{{ iriven_chgpasswd_audit_file }}"
        create: true
        owner: root
        group: root
        mode: '0600'
        insertafter: EOF
        line: >-
          {{
            {
              'timestamp': ansible_date_time.iso8601,
              'host': inventory_hostname,
              'role': 'changepassword',
              'user': item.username,
              'state': item.state,
              'expire': item.expire,
              'aging_enabled': iriven_chgpasswd_set_aging | bool,
              'audit_only': iriven_chgpasswd_audit_only | bool,
              'target_selector': iriven_chgpasswd_requested_user,
              'changed_by': 'ansible'
            } | to_json
          }}
      changed_when: false
      loop: "{{ iriven_chgpasswd_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
