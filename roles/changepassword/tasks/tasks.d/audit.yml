---
- name: changepassword | Write local audit trail without secrets
  block:
    - name: changepassword | Ensure audit directory exists
      ansible.builtin.file:
        path: "{{ iriven_chgpasswd_audit_file | dirname }}"
        state: directory
        owner: root
        group: root
        mode: '0750'

    - name: changepassword | Write password/account change audit event without secrets
      ansible.builtin.lineinfile:
        path: "{{ iriven_chgpasswd_audit_file }}"
        create: true
        owner: root
        group: root
        mode: '0600'
        insertafter: EOF
        line: >-
          {{ ansible_date_time.iso8601 }} host={{ inventory_hostname }} user={{ item.username }} state={{ item.state }} expire={{ item.expire }} changed_by=ansible role=changepassword
      loop: "{{ iriven_chgpasswd_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
