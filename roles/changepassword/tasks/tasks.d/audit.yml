---
- name: Changepassword | Ensure audit directory exists
  ansible.builtin.file:
    path: '{{ changepassword_audit_file | dirname }}'
    state: directory
    owner: '{{ changepassword_audit_owner }}'
    group: '{{ changepassword_audit_group }}'
    mode: '{{ changepassword_audit_dir_mode }}'
  when: changepassword_audit_enabled | bool
- name: Changepassword | Ensure audit file exists with restricted permissions
  ansible.builtin.file:
    path: '{{ changepassword_audit_file }}'
    state: touch
    owner: '{{ changepassword_audit_owner }}'
    group: '{{ changepassword_audit_group }}'
    mode: '{{ changepassword_audit_file_mode }}'
  changed_when: false
  when: changepassword_audit_enabled | bool
- name: Changepassword | Write SIEM-ready password rotation audit event without secrets
  ansible.builtin.lineinfile:
    path: '{{ changepassword_audit_file }}'
    create: true
    owner: '{{ changepassword_audit_owner }}'
    group: '{{ changepassword_audit_group }}'
    mode: '{{ changepassword_audit_file_mode }}'
    line: '{{ {''schema_version'': changepassword_audit_schema_version, ''event'': ''password_rotation'', ''host'': inventory_hostname, ''requested_target'': changepassword_target_account_normalized | default(changepassword_target_account | default(''root'', true)), ''target_username'': item.username, ''target_state'': item.state | default(''unlocked''), ''expire_requested'': item.expire | default(false), ''changed_by'': ansible_user_id | default(''unknown''), ''timestamp'': ansible_date_time.iso8601 | default(''unknown'')} | to_json }}'
    insertafter: EOF
  loop: '{{ changepassword_target_accounts }}'
  loop_control:
    label: '{{ item.username | default(''unknown'') }}'
  no_log: '{{ changepassword_use_no_log | bool }}'
  when: changepassword_audit_enabled | bool
