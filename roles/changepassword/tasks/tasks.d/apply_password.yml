---
- name: changepassword | Apply password and status to existing local accounts only
  block:
    - name: changepassword | Rotate password and optionally lock/unlock existing account
      ansible.builtin.user:
        name: "{{ item.username }}"
        password: "{{ item.final_password_hash if item.manage_password | bool else omit }}"
        update_password: "{{ 'always' if item.manage_password | bool else omit }}"
        password_lock: "{{ true if item.state | default('unchanged') == 'locked' else false if item.state | default('unchanged') == 'unlocked' else omit }}"
      loop: "{{ iriven_chgpasswd_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      register: iriven_chgpasswd_apply_results
      no_log: "{{ iriven_chgpasswd_use_no_log | bool }}"

    - name: changepassword | Lock account after password change when requested globally
      ansible.builtin.user:
        name: "{{ item.username }}"
        password_lock: true
      loop: "{{ iriven_chgpasswd_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      when:
        - iriven_chgpasswd_lock_after_change | bool
        - item.manage_password | bool
        - item.username != 'root' or iriven_chgpasswd_allow_root_lock | bool
