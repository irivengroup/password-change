---
- name: Changepassword | Run secured password rotation workflow
  block:
    - name: Changepassword | Acquire host-level execution lock
      ansible.builtin.command:
        argv:
          - /bin/mkdir
          - "{{ changepassword_lock_path }}"
      register: changepassword_lock_result
      changed_when: false
      failed_when: changepassword_lock_result.rc != 0
      when: changepassword_lock_enabled | bool

    - name: Changepassword | Preflight validation
      ansible.builtin.include_tasks: tasks.d/preflight.yml

    - name: Changepassword | Normalize input data
      ansible.builtin.include_tasks: tasks.d/normalize.yml

    - name: Changepassword | Run shadow pre-change hardening checks
      ansible.builtin.include_tasks: tasks.d/shadow.yml

    - name: Changepassword | Apply password changes
      ansible.builtin.include_tasks: tasks.d/apply.yml
      when: not (changepassword_audit_only | bool)

    - name: Changepassword | Apply password expiration and ageing
      ansible.builtin.include_tasks: tasks.d/aging.yml
      when: not (changepassword_audit_only | bool)

    - name: Changepassword | Write audit events
      ansible.builtin.include_tasks: tasks.d/audit.yml
      when: changepassword_audit_enabled | bool

  rescue:
    - name: Changepassword | Report secured workflow failure
      ansible.builtin.fail:
        msg: >-
          changepassword failed on {{ inventory_hostname }}. Review the previous task output.
          Secrets are hidden when changepassword_use_no_log=true.

  always:
    - name: Changepassword | Release host-level execution lock
      ansible.builtin.file:
        path: "{{ changepassword_lock_path }}"
        state: absent
      changed_when: false
      when: changepassword_lock_enabled | default(true) | bool

    - name: Changepassword | Cleanup sensitive runtime facts
      ansible.builtin.set_fact:
        changepassword_normalized_accounts: []
        changepassword_existing_local_users: []
        changepassword_target_accounts: []
        changepassword_declared_changepassword_target_accounts: []
        changepassword_requested_user: ""
        changepassword_selected_login_shells: {}
        changepassword_etc_passwd_raw: {}
        changepassword_shadow_hashes: {}
        changepassword_shadow_raw: {}
        changepassword_machine_id: ""
        changepassword_machine_id_file: ""
        changepassword_machine_id_raw: {}
        changepassword_effective_salt_identity: ""
        changepassword_effective_hmac_salt_secret: ""
        changepassword_custom_hmac_secret_is_valid: false
        changepassword_shadow_ageing_state: {}
        changepassword_apply_results: {}
        changepassword_lock_result: {}
        changepassword_getent_passwd_results: {}
        changepassword_selected_shell_stats: {}
        changepassword_machine_id_stat: {}
        changepassword_audit_sha256: {}
      no_log: true
      changed_when: false
      when: changepassword_cleanup_sensitive_facts | default(true) | bool
