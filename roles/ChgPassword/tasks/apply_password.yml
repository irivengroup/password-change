---
- name: ChgPassword | Apply local account password state
  block:
    - name: ChgPassword | Change local account password
      ansible.builtin.user:
        name: "{{ item.username }}"
        password: "{{ item.final_password_hash }}"
        update_password: always
        password_lock: "{{ true if (item.state | default('present')) == 'locked' else false if (item.state | default('present')) == 'unlocked' else omit }}"
        shell: "{{ item.shell | default(omit) }}"
      loop: "{{ change_password_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      register: change_password_apply_results
      no_log: "{{ change_password_use_no_log | bool }}"

    - name: ChgPassword | Lock account after password change when requested globally
      ansible.builtin.user:
        name: "{{ item.username }}"
        password_lock: true
      loop: "{{ change_password_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      when:
        - change_password_lock_after_change | bool
        - item.username != 'root' or change_password_allow_root_lock | bool
