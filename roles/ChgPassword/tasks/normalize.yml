---
- name: ChgPassword | Build normalized runtime data
  block:
    - name: ChgPassword | Reset normalized account list
      ansible.builtin.set_fact:
        change_password_normalized_accounts: []
      no_log: "{{ change_password_use_no_log | bool }}"

    - name: ChgPassword | Build normalized password change list
      ansible.builtin.set_fact:
        change_password_normalized_accounts: >-
          {{
            change_password_normalized_accounts
            + [
                item | combine({
                  'generated_salt': (
                    (
                      (change_password_hash_salt_prefix ~ ':' ~ item.username ~ ':' ~ inventory_hostname)
                      | chgpassword_hmac_salt(
                          change_password_hmac_salt_secret,
                          change_password_hmac_algorithm,
                          change_password_salt_length
                        )
                    )
                    if change_password_hash_salt_mode == 'hmac_inventory'
                    else (
                      (
                        (change_password_hash_salt_prefix ~ ':' ~ item.username ~ ':' ~ inventory_hostname)
                        | hash(change_password_salt_hash_algorithm)
                      )[:change_password_salt_length]
                    )
                  ),
                  'final_password_hash': (
                    item.password_hash
                    if (item.password_hash | default('') | length > 0)
                    else (
                      item.password_plain
                      | password_hash(
                          'sha512',
                          (
                            (
                              (change_password_hash_salt_prefix ~ ':' ~ item.username ~ ':' ~ inventory_hostname)
                              | chgpassword_hmac_salt(
                                  change_password_hmac_salt_secret,
                                  change_password_hmac_algorithm,
                                  change_password_salt_length
                                )
                            )
                            if change_password_hash_salt_mode == 'hmac_inventory'
                            else (
                              (
                                (change_password_hash_salt_prefix ~ ':' ~ item.username ~ ':' ~ inventory_hostname)
                                | hash(change_password_salt_hash_algorithm)
                              )[:change_password_salt_length]
                            )
                          ),
                          rounds=change_password_default_hash_rounds
                        )
                    )
                  )
                })
              ]
          }}
      loop: "{{ change_password_accounts }}"
      loop_control:
        label: "{{ item.username }}@{{ inventory_hostname }}"
      no_log: "{{ change_password_use_no_log | bool }}"
