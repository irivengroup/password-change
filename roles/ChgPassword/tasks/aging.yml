---
- name: ChgPassword | Apply expiration and password ageing policies
  block:
    - name: ChgPassword | Expire password to force change at next login
      ansible.builtin.command:
        argv:
          - /usr/bin/chage
          - -d
          - "0"
          - "{{ item.username }}"
      loop: "{{ change_password_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      when: item.expire | default(false) | bool
      changed_when: true

    - name: ChgPassword | Set password ageing policy
      ansible.builtin.command:
        argv: >-
          {{
            ['/usr/bin/chage']
            + ((['-m', change_password_min_days|string]) if change_password_min_days is not none else [])
            + ((['-M', change_password_max_days|string]) if change_password_max_days is not none else [])
            + ((['-W', change_password_warn_days|string]) if change_password_warn_days is not none else [])
            + ((['-I', change_password_inactive_days|string]) if change_password_inactive_days is not none else [])
            + [item.username]
          }}
      loop: "{{ change_password_normalized_accounts }}"
      loop_control:
        label: "{{ item.username }}"
      when: change_password_set_aging | bool
      changed_when: true
