---
# Local Linux accounts whose password state must be managed.
# Required per item:
#   username: root|user
#   password_hash: "$6$rounds=656000$..."   # recommended and default-required
# Optional per item:
#   password_plain: "..."                   # disabled unless change_password_allow_plaintext_password=true
#   expire: false
#   state: present                           # present|locked|unlocked
#   shell: omit                              # optional, not changed unless explicitly set
change_password_accounts: []

# Security posture.
change_password_require_hash: true
change_password_allow_plaintext_password: false
change_password_use_no_log: true
change_password_fail_if_user_missing: true
change_password_manage_root: true
change_password_allow_root_lock: false
change_password_allow_empty_password: false

# Password policy applied only when password_plain is enabled.
change_password_enforce_complexity: true
change_password_min_length: 16
change_password_require_upper: true
change_password_require_lower: true
change_password_require_digit: true
change_password_require_special: true
change_password_forbidden_plain_values:
  - password
  - Password123!
  - ChangeMe123!
  - Admin123!

# Hashing parameters used only when password_plain is explicitly allowed.
# Recommended mode:
#   hmac_inventory
# Salt derivation:
#   salt = HMAC-SHA256(<vault_secret>, <prefix>:<username>:<inventory_hostname>)[:16]
# This keeps deterministic idempotence while preventing public salt prediction.
change_password_default_hash_rounds: 656000
change_password_hash_salt_mode: hmac_inventory
change_password_hash_salt_prefix: chgpassword:v2
change_password_hmac_algorithm: sha256
change_password_hmac_salt_secret: ""
change_password_salt_length: 16

# Legacy deterministic public salt mode is intentionally disabled by default.
# Enable only for lab/backward-compatibility use.
change_password_allow_public_deterministic_salt: false
change_password_salt_hash_algorithm: sha256

# Password ageing. Omit values with null.
change_password_set_aging: false
change_password_min_days: null
change_password_max_days: null
change_password_warn_days: null
change_password_inactive_days: null

# Optional account lock after password change, except root unless explicitly allowed.
change_password_lock_after_change: false

# Auditing without secrets. Written on managed host.
change_password_audit_enabled: true
change_password_audit_file: /var/log/ansible/change-password.log

# Execution safety.
change_password_check_shadow_backend: true
change_password_validate_username_regex: '^[a-z_][a-z0-9_-]{0,31}$|^root$'
change_password_cleanup_sensitive_facts: true
