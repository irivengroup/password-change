---
- name: Validate account list is provided
  ansible.builtin.assert:
    that:
      - change_password_accounts is iterable
      - change_password_accounts | length > 0
    fail_msg: "change_password_accounts must contain at least one account."

- name: Validate account definitions
  ansible.builtin.assert:
    that:
      - item.username is defined
      - item.username | string | length > 0
      - (item.password_hash | default('') | length > 0) or (item.password_plain | default('') | length > 0)
      - item.state | default('present') in ['present', 'locked', 'unlocked']
    fail_msg: "Each account requires username and either password_hash or password_plain."
  loop: "{{ change_password_accounts }}"
  loop_control:
    label: "{{ item.username | default('undefined') }}"
  no_log: "{{ change_password_use_no_log | bool }}"

- name: Validate clear-text password complexity
  ansible.builtin.assert:
    that:
      - item.password_plain | length >= change_password_min_length
      - item.password_plain is regex('[A-Z]')
      - item.password_plain is regex('[a-z]')
      - item.password_plain is regex('[0-9]')
      - item.password_plain is regex('[^A-Za-z0-9]')
    fail_msg: >-
      Clear-text password for {{ item.username }} does not meet complexity policy:
      minimum length, uppercase, lowercase, digit, and special character are required.
  loop: "{{ change_password_accounts }}"
  loop_control:
    label: "{{ item.username }}"
  when:
    - change_password_enforce_complexity | bool
    - item.password_plain | default('') | length > 0
  no_log: "{{ change_password_use_no_log | bool }}"

- name: Check local account existence
  ansible.builtin.command:
    cmd: "getent passwd {{ item.username }}"
  register: change_password_getent
  changed_when: false
  failed_when: false
  loop: "{{ change_password_accounts }}"
  loop_control:
    label: "{{ item.username }}"

- name: Fail if local account is missing
  ansible.builtin.assert:
    that:
      - item.rc == 0
    fail_msg: "Local account '{{ item.item.username }}' does not exist on {{ inventory_hostname }}."
  loop: "{{ change_password_getent.results }}"
  loop_control:
    label: "{{ item.item.username }}"
  when: change_password_fail_if_user_missing | bool

- name: Build normalized password change list
  ansible.builtin.set_fact:
    change_password_normalized_accounts: >-
      {{
        (change_password_normalized_accounts | default([]))
        + [
            item
            | combine({
                'final_password_hash': (
                  item.password_hash
                  if (item.password_hash | default('') | length > 0)
                  else (item.password_plain | password_hash('sha512', rounds=change_password_default_hash_rounds))
                )
              })
          ]
      }}
  loop: "{{ change_password_accounts }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: "{{ change_password_use_no_log | bool }}"

- name: Change local account password
  ansible.builtin.user:
    name: "{{ item.username }}"
    password: "{{ item.final_password_hash }}"
    update_password: always
    password_lock: "{{ true if (item.state | default('present')) == 'locked' else false if (item.state | default('present')) == 'unlocked' else omit }}"
  loop: "{{ change_password_normalized_accounts }}"
  loop_control:
    label: "{{ item.username }}"
  no_log: "{{ change_password_use_no_log | bool }}"

- name: Expire password to force change at next login
  ansible.builtin.command:
    cmd: "chage -d 0 {{ item.username }}"
  loop: "{{ change_password_normalized_accounts }}"
  loop_control:
    label: "{{ item.username }}"
  when: item.expire | default(false) | bool
  changed_when: true

- name: Lock account after password change when requested globally
  ansible.builtin.user:
    name: "{{ item.username }}"
    password_lock: true
  loop: "{{ change_password_normalized_accounts }}"
  loop_control:
    label: "{{ item.username }}"
  when: change_password_lock_after_change | bool
